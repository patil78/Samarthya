<!DOCTYPE html>
<html>
<head>
    <title>Resume Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-4xl mx-auto p-6 bg-white shadow-lg rounded-lg mt-6">

<h2 class="text-2xl font-bold text-indigo-600 mb-6">Resume Generator</h2>

<form action="/generate" method="POST">

    <!-- Personal Info -->
    <input type="text" name="name" placeholder="Name" class="w-full p-2 border rounded mb-3">
    <input type="email" name="email" placeholder="Email" class="w-full p-2 border rounded mb-3">
    <input type="text" name="phone" placeholder="Phone" class="w-full p-2 border rounded mb-6">

    <!-- Summary -->
    <h3 class="font-semibold text-indigo-700 mb-2">Professional Summary</h3>
    <textarea name="summary" class="w-full p-2 border rounded mb-6"></textarea>

    <!-- 10th -->
    <h3 class="font-semibold text-indigo-700 mb-2">10th Grade</h3>
    <input type="text" name="tenth_school" placeholder="School Name" class="w-full p-2 border rounded mb-2">
    <input type="text" name="tenth_marks" placeholder="Marks" class="w-full p-2 border rounded mb-4">

    <!-- 12th -->
    <h3 class="font-semibold text-indigo-700 mb-2">12th</h3>
    <input type="text" name="twelfth_college" placeholder="College Name" class="w-full p-2 border rounded mb-2">
    <input type="text" name="twelfth_marks" placeholder="Marks" class="w-full p-2 border rounded mb-4">

    <!-- Graduation -->
    <h3 class="font-semibold text-indigo-700 mb-2">Graduation</h3>
    <input type="text" name="grad_college" placeholder="College Name" class="w-full p-2 border rounded mb-2">
    <input type="text" name="grad_marks" placeholder="CGPA" class="w-full p-2 border rounded mb-4">

    <!-- Skills -->
    <h3 class="font-semibold text-indigo-700 mb-2">Skills</h3>
    <textarea name="skills" class="w-full p-2 border rounded mb-4"></textarea>

    <!-- Projects -->
    <h3 class="font-semibold text-indigo-700 mb-2">Projects (comma separated)</h3>
    <textarea name="projects" class="w-full p-2 border rounded mb-4"></textarea>

    <!-- Certifications -->
    <h3 class="font-semibold text-indigo-700 mb-2">Certifications</h3>
    <textarea name="certifications" class="w-full p-2 border rounded mb-4"></textarea>

    <!-- Role -->
    <select name="role" class="w-full p-2 border rounded mb-6">
        <option value="tech">Tech</option>
        <option value="finance">Finance</option>
        <option value="agri">Agriculture</option>
    </select>

    <button class="bg-indigo-600 text-white px-4 py-2 rounded w-full">
        Generate Resume
    </button>

</form>

</div>

</body>
</html>
